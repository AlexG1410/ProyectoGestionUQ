# Production Profile Configuration
# IMPORTANT: Set these environment variables before deploying to production

# Database - Remote/Cloud
DB_URL=${DB_URL}
DB_USERNAME=${DB_USERNAME}
DB_PASSWORD=${DB_PASSWORD}
DB_DDL_AUTO=validate

# Server
SERVER_PORT=${SERVER_PORT:8080}

# JWT Secret - MUST be set as environment variable in production
# Minimum 256 bits (43 characters) for security
# Generate: openssl rand -base64 32
JWT_SECRET=${JWT_SECRET}
JWT_EXPIRATION_MS=86400000

# Logging - Minimal in production
spring.jpa.show-sql=false

# Google Gemini AI - Production
# IMPORTANT: Set GEMINI_API_KEY as environment variable before deploying
GEMINI_API_KEY=${GEMINI_API_KEY}
logging.level.root=WARN
logging.level.co.edu.uniquindio.proyectoprogramacion=INFO

# CORS - Set production domains as env var
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://example.com}
