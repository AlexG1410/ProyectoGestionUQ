openapi: 3.0.3

info:
  title: API Gestión de Solicitudes Académicas
  version: 1.1.0
  description: |
    API REST para sistema de triage y gestión de solicitudes académicas.

    Funcionalidades principales:
    - Registro de solicitudes
    - Clasificación y priorización
    - Asignación de responsables
    - Gestión de estados del ciclo de vida
    - Cierre de solicitudes
    - Historial auditable
    - Sugerencias asistidas por motor de reglas (IA opcional / no crítica)
    - Autenticación con JWT


servers:
  - url: http://localhost:8080
    description: Servidor local

tags:
  - name: Autenticación
    description: Endpoints de login y consulta del usuario autenticado
  - name: Solicitudes
    description: Gestión del ciclo de vida de solicitudes académicas
  - name: Usuarios
    description: Consulta de responsables activos
  - name: Historial
    description: Consulta de historial auditable
  - name: IA
    description: Funcionalidades asistivas (motor de reglas / resumen)

security:
  - bearerAuth: []

paths:
  # ===========================
  # AUTENTICACIÓN
  # ===========================
  /api/auth/login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión y obtener JWT
      description: |
        Autentica al usuario y retorna un token JWT para consumir endpoints protegidos.
        **Endpoint público** (no requiere token).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/me:
    get:
      tags: [Autenticación]
      summary: Obtener información del usuario autenticado
      description: |
        Retorna información básica del usuario autenticado por JWT (username y roles).
        **Roles permitidos:** Cualquier usuario autenticado.
      responses:
        '200':
          description: Usuario autenticado obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthMeResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ===========================
  # USUARIOS
  # ===========================
  /api/usuarios/responsables-activos:
    get:
      tags: [Usuarios]
      summary: Listar responsables activos
      description: |
        Lista usuarios activos elegibles para asignación de solicitudes.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR, CONSULTOR.
      responses:
        '200':
          description: Responsables activos obtenidos correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUsuarioSimpleList'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ===========================
  # SOLICITUDES
  # ===========================
  /api/solicitudes:
    post:
      tags: [Solicitudes]
      summary: Registrar una solicitud académica
      description: |
        Registra una nueva solicitud académica.
        La solicitud queda inicialmente en estado `REGISTRADA`.
        **Roles permitidos:** SOLICITANTE, ADMINISTRATIVO, COORDINADOR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudCreate'
      responses:
        '201':
          description: Solicitud registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '400':
          description: Error de validación o regla de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    get:
      tags: [Solicitudes]
      summary: Consultar solicitudes por filtros
      description: |
        Consulta solicitudes con filtros opcionales.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR, CONSULTOR.
      parameters:
        - in: query
          name: estado
          description: Estado de la solicitud
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
        - in: query
          name: tipo
          description: Tipo de solicitud
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
        - in: query
          name: prioridad
          description: Prioridad de la solicitud
          schema:
            $ref: '#/components/schemas/Prioridad'
        - in: query
          name: responsableId
          description: ID del usuario responsable asignado
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Consulta realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudList'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}:
    get:
      tags: [Solicitudes]
      summary: Obtener solicitud por ID
      description: |
        Obtiene el detalle de una solicitud académica.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR, CONSULTOR.
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}/clasificar-priorizar:
    put:
      tags: [Solicitudes]
      summary: Clasificar y priorizar solicitud
      description: |
        Define/ajusta el tipo de solicitud y la prioridad de atención.
        Esta operación normalmente mueve la solicitud a estado `CLASIFICADA` (según reglas del backend).
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.

        Restricciones:
        - No se permite modificar una solicitud ya cerrada.
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificarPriorizar'
      responses:
        '200':
          description: Solicitud clasificada y priorizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '400':
          description: Regla de negocio inválida o datos inconsistentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflicto de estado (ej. solicitud cerrada/no modificable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}/asignar:
    put:
      tags: [Solicitudes]
      summary: Asignar responsable
      description: |
        Asigna un responsable activo a la solicitud.
        La asignación genera una entrada en el historial auditable.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.

        Restricciones:
        - No se permite modificar una solicitud ya cerrada.
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarResponsable'
      responses:
        '200':
          description: Responsable asignado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '400':
          description: Responsable inválido o inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Solicitud o responsable no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflicto de estado (ej. solicitud cerrada/no modificable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}/estado:
    put:
      tags: [Solicitudes]
      summary: Cambiar estado de la solicitud
      description: |
        Realiza una transición de estado validada del ciclo de vida.

        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.

        Transiciones válidas esperadas:
        - REGISTRADA -> CLASIFICADA
        - CLASIFICADA -> EN_ATENCION
        - EN_ATENCION -> ATENDIDA

        Restricciones:
        - `CERRADA` NO se asigna por este endpoint (usar `/api/solicitudes/{id}/cerrar`)
        - No se permite modificar una solicitud ya cerrada
        - Transiciones inválidas retornan error
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstado'
      responses:
        '200':
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '400':
          description: Transición de estado inválida o datos inconsistentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflicto de estado (ej. solicitud cerrada/no modificable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}/cerrar:
    put:
      tags: [Solicitudes]
      summary: Cerrar solicitud
      description: |
        Cierra formalmente la solicitud registrando observación de cierre.
        Solo se permite si la solicitud está en estado `ATENDIDA`.

        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.

        Restricciones:
        - Una solicitud cerrada no puede ser modificada posteriormente
        - El cierre genera una entrada en el historial auditable
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CerrarSolicitud'
      responses:
        '200':
          description: Solicitud cerrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSolicitudResponse'
        '400':
          description: Datos inválidos o regla de negocio incumplida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: La solicitud no puede cerrarse en su estado actual o ya está cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/{id}/historial:
    get:
      tags: [Historial]
      summary: Obtener historial de la solicitud
      description: |
        Devuelve el historial auditable de acciones de la solicitud.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR, CONSULTOR.
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      responses:
        '200':
          description: Historial obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHistorialList'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ===========================
  # IA / REGLAS (ASISTIVO)
  # ===========================
  /api/solicitudes/{id}/resumen:
    get:
      tags: [IA]
      summary: Generar resumen asistido (IA opcional / fallback)
      description: |
        Genera un resumen textual de la solicitud y su contexto/historial (según implementación).
        Puede usar IA externa o fallback local.
        **No modifica datos de la solicitud**.
        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR, CONSULTOR.
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      responses:
        '200':
          description: Resumen generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/sugerir-prioridad:
    post:
      tags: [IA]
      summary: Sugerir prioridad mediante motor de reglas
      description: |
        Evalúa criterios como impacto académico, tipo y fecha límite para sugerir una prioridad.

        **Importante:**
        - Es una sugerencia asistiva
        - **NO modifica** automáticamente ninguna solicitud
        - Debe ser confirmada o ajustada manualmente por un usuario autorizado
        - El sistema debe poder operar sin esta funcionalidad

        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SugerirPrioridadRequest'
      responses:
        '200':
          description: Prioridad sugerida correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSugerirPrioridadResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/solicitudes/sugerir-clasificacion-prioridad:
    post:
      tags: [IA]
      summary: Sugerir tipo de solicitud y prioridad (asistivo)
      description: |
        Analiza la descripción y otros datos de contexto para sugerir:
        - tipo de solicitud
        - prioridad de atención

        **Importante:**
        - Es una sugerencia asistiva (RF-10)
        - **NO modifica** automáticamente ninguna solicitud
        - Debe ser confirmada o ajustada por un usuario mediante `/api/solicitudes/{id}/clasificar-priorizar`
        - El sistema debe poder operar sin IA externa (fallback por reglas)

        **Roles permitidos:** ADMINISTRATIVO, COORDINADOR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SugerirClasificacionPrioridadRequest'
      responses:
        '200':
          description: Sugerencia de clasificación y prioridad generada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSugerirClasificacionPrioridadResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  # ===========================
  # SEGURIDAD
  # ===========================
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ===========================
  # PARAMETERS
  # ===========================
  parameters:
    SolicitudId:
      name: id
      in: path
      required: true
      description: ID de la solicitud
      schema:
        type: integer
        format: int64
        minimum: 1
        example: 1

  # ===========================
  # SCHEMAS
  # ===========================
  schemas:
    # ---------- Enums reutilizables ----------
    TipoSolicitud:
      type: string
      enum:
        - REGISTRO_ASIGNATURAS
        - HOMOLOGACION
        - CANCELACION_ASIGNATURAS
        - SOLICITUD_CUPOS
        - CONSULTA_ACADEMICA
        - OTRO
      example: HOMOLOGACION

    Prioridad:
      type: string
      enum: [BAJA, MEDIA, ALTA, CRITICA]
      example: ALTA

    EstadoSolicitud:
      type: string
      enum: [REGISTRADA, CLASIFICADA, EN_ATENCION, ATENDIDA, CERRADA]
      example: REGISTRADA

    EstadoSolicitudTransicionable:
      type: string
      description: |
        Estados permitidos para transición vía endpoint `/estado`.
        `CERRADA` se gestiona exclusivamente por `/cerrar`.
      enum: [REGISTRADA, CLASIFICADA, EN_ATENCION, ATENDIDA]
      example: EN_ATENCION

    CanalOrigen:
      type: string
      enum: [CSU, CORREO, SAC, TELEFONICO, PRESENCIAL, OTRO]
      example: CORREO

    ImpactoAcademico:
      type: string
      description: Nivel de impacto académico reportado o inferido
      enum: [BAJO, MEDIO, ALTO, CRITICO]
      example: ALTO

    RolUsuario:
      type: string
      enum: [SOLICITANTE, ADMINISTRATIVO, COORDINADOR, CONSULTOR]
      example: ADMINISTRATIVO

    AccionHistorial:
      type: string
      enum:
        - REGISTRO_SOLICITUD
        - CLASIFICACION_PRIORIZACION
        - ASIGNACION_RESPONSABLE
        - CAMBIO_ESTADO
        - CIERRE_SOLICITUD
        - GENERACION_RESUMEN
      example: CAMBIO_ESTADO

    # ---------- Wrappers ----------
    ApiResponseBase:
      type: object
      required: [success, message, timestamp]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operación exitosa
        timestamp:
          type: string
          format: date-time
          example: "2026-03-01T19:45:10.123"

    ApiResponseSolicitudResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SolicitudResponse'

    ApiResponseSolicitudList:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SolicitudResponse'

    ApiResponseHistorialList:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/HistorialResponse'

    ApiResponseUsuarioSimpleList:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UsuarioSimple'

    ApiResponseAuthMeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AuthMeResponse'

    ApiResponseLoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/LoginResponse'

    ApiResponseSugerirPrioridadResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SugerirPrioridadResponse'

    ApiResponseSugerirClasificacionPrioridadResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SugerirClasificacionPrioridadResponse'

    ApiResponseString:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: string
              example: "Resumen de la solicitud: ..."

    # ---------- Error ----------
    ApiError:
      type: object
      required: [timestamp, status, error, message, path]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-03-01T19:45:10.123"
        status:
          type: integer
          example: 409
        error:
          type: string
          example: Conflict
        message:
          type: string
          example: La solicitud se encuentra cerrada y no puede modificarse
        path:
          type: string
          example: /api/solicitudes/1/estado

    # ---------- Auth ----------
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: admin1
        password:
          type: string
          minLength: 4
          maxLength: 100
          example: "123456"

    LoginResponse:
      type: object
      required: [token, type, username, roles]
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbjEiLCJyb2xlcyI6WyJST0xFX0FETUlOSVNUUkFUSVZPIl0sImlhdCI6MTcwOTI5MDAwMCwiZXhwIjoxNzA5Mzc2NDAwfQ.signature
        type:
          type: string
          example: Bearer
        username:
          type: string
          example: admin1
        roles:
          type: array
          items:
            type: string
          example: [ROLE_ADMINISTRATIVO]

    AuthMeResponse:
      type: object
      required: [username, authenticated, roles]
      properties:
        username:
          type: string
          example: admin1
        authenticated:
          type: boolean
          example: true
        roles:
          type: array
          items:
            type: string
          example: [ROLE_ADMINISTRATIVO]

    # ---------- Solicitudes ----------
    SolicitudCreate:
      type: object
      required: [tipoSolicitud, descripcion, canalOrigen, identificacionSolicitante]
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        descripcion:
          type: string
          minLength: 10
          maxLength: 2000
          example: Solicito homologación de Matemáticas I por traslado.
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        identificacionSolicitante:
          type: string
          minLength: 5
          maxLength: 20
          example: "1090123456"
        impactoAcademico:
          $ref: '#/components/schemas/ImpactoAcademico'
        fechaLimite:
          type: string
          format: date
          example: 2026-03-10

    ClasificarPriorizar:
      type: object
      required: [tipoSolicitud, prioridad, justificacionPrioridad]
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        prioridad:
          $ref: '#/components/schemas/Prioridad'
        justificacionPrioridad:
          type: string
          minLength: 5
          maxLength: 500
          example: El estudiante tiene matrícula próxima.

    AsignarResponsable:
      type: object
      required: [responsableId]
      properties:
        responsableId:
          type: integer
          format: int64
          minimum: 1
          example: 2

    CambiarEstado:
      type: object
      required: [nuevoEstado]
      properties:
        nuevoEstado:
          $ref: '#/components/schemas/EstadoSolicitudTransicionable'
        observacion:
          type: string
          minLength: 3
          maxLength: 500
          example: Se inició revisión documental.

    CerrarSolicitud:
      type: object
      required: [observacionCierre]
      properties:
        observacionCierre:
          type: string
          minLength: 5
          maxLength: 1000
          example: Solicitud atendida y notificada al estudiante.

    SolicitudResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        descripcion:
          type: string
          example: Solicitud de homologación
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        fechaHoraRegistro:
          type: string
          format: date-time
          example: "2026-03-01T19:40:00"
        identificacionSolicitante:
          type: string
          example: "1090123456"
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        prioridad:
          allOf:
            - $ref: '#/components/schemas/Prioridad'
          nullable: true
        justificacionPrioridad:
          type: string
          nullable: true
          example: Fecha de matrícula próxima
        responsable:
          type: string
          nullable: true
          example: admin1
        cerrada:
          type: boolean
          example: false
        fechaCierre:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-05T16:22:10"

    HistorialResponse:
      type: object
      properties:
        fechaHora:
          type: string
          format: date-time
          example: "2026-03-01T19:41:10"
        accion:
          $ref: '#/components/schemas/AccionHistorial'
        usuarioResponsable:
          type: string
          example: admin1
        observaciones:
          type: string
          example: Se inició revisión documental.

    UsuarioSimple:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin1
        nombreCompleto:
          type: string
          example: Administrador Principal
        rol:
          $ref: '#/components/schemas/RolUsuario'
        activo:
          type: boolean
          example: true

    # ---------- Reglas / IA ----------
    SugerirPrioridadRequest:
      type: object
      required: [tipoSolicitud]
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        impactoAcademico:
          $ref: '#/components/schemas/ImpactoAcademico'
        fechaLimite:
          type: string
          format: date
          example: 2026-03-05

    SugerirPrioridadResponse:
      type: object
      required: [prioridadSugerida, puntajeTotal, razones]
      properties:
        prioridadSugerida:
          $ref: '#/components/schemas/Prioridad'
        puntajeTotal:
          type: integer
          minimum: 0
          example: 75
        razones:
          type: array
          items:
            type: string
          example:
            - Impacto académico alto (+35)
            - Fecha límite próxima (<=7 días) (+25)
            - Tipo HOMOLOGACION (+15)
            - "Puntaje total: 75 => Prioridad sugerida: ALTA"

    SugerirClasificacionPrioridadRequest:
      type: object
      required: [descripcion]
      properties:
        descripcion:
          type: string
          minLength: 10
          maxLength: 2000
          example: Solicito homologación de Matemáticas I cursada en otra universidad por traslado reciente.
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        impactoAcademico:
          $ref: '#/components/schemas/ImpactoAcademico'
        fechaLimite:
          type: string
          format: date
          example: 2026-03-05

    SugerirClasificacionPrioridadResponse:
      type: object
      required: [tipoSolicitudSugerido, prioridadSugerida, razones]
      properties:
        tipoSolicitudSugerido:
          $ref: '#/components/schemas/TipoSolicitud'
        prioridadSugerida:
          $ref: '#/components/schemas/Prioridad'
        confianza:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.87
        puntajeTotal:
          type: integer
          minimum: 0
          nullable: true
          example: 78
        razones:
          type: array
          items:
            type: string
          example:
            - El texto menciona "homologación" explícitamente
            - Existe fecha límite cercana
            - Impacto académico reportado alto
        requiereConfirmacionHumana:
          type: boolean
          example: true