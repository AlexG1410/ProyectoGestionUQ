spring.application.name=ProyectoGestionUQ

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/gestion_solicitudes}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3200}
spring.data.web.pageable.max-page-size=100

# JWT Configuration
app.jwt.secret=${JWT_SECRET:thisIsADevelopmentJWTSecretKeyMustBeAtLeast256BitsLongForProductionEnvironmentPleaseChangeThis123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google Gemini AI Configuration
gemini.api-key=${GEMINI_API_KEY:}
gemini.base-url=https://generativelanguage.googleapis.com
gemini.model=gemini-1.5-flash
gemini.max-tokens=512
gemini.timeout-ms=10000
gemini.temperature=0.7
