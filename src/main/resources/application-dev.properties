JWT_SECRET=thisIsADevelopmentJWTSecretKeyMustBeAtLeast256BitsLongForProductionEnvironmentPleaseChangeThis123456789
JWT_EXPIRATION_MS=86400000

# Logging
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.co.edu.uniquindio.proyectoprogramacion=INFO

