# Development Profile Configuration

# Database - MariaDB local
DB_URL=jdbc:mariadb://localhost:3306/gestion_solicitudes
DB_USERNAME=root
DB_PASSWORD=12345
DB_DDL_AUTO=update

# Server
SERVER_PORT=8080

# CORS
CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:3200

# JWT Secret - DEVELOPMENT ONLY (256+ bits minimum for production)
