spring.application.name=ProyectoProgramacion-Test

# Usar H2 en memoria para tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.root=WARN
logging.level.co.edu.uniquindio.proyectoprogramacion=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT
app.jwt.secret=testSecretKeyForJWTTokenSigningInTestEnvironmentOnlyNotForProduction123456789
app.jwt.expiration=86400000

# Desactivar inicializador de datos para tests
spring.main.lazy-initialization=false
